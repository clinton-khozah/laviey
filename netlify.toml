# Netlify — build from repo root (leave Base directory EMPTY in Netlify UI).

[build]
  command = "npm install --prefix lavey_frontend --no-audit --no-fund && npm run build"
  publish = "lavey_frontend/dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_BASE_URL = "https://laveybackend-3.onrender.com/api"
  VITE_USE_MOCK_API = "false"
  VITE_USE_REAL_AUTH = "true"
  VITE_SUPABASE_URL = "https://wgyqotbvjnkafmwmhvbj.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_F9_1U8m0og8iS3tQmBD6YQ_xV-AVFlL"
  SECRETS_SCAN_OMIT_KEYS = "PORT,API_PREFIX,FRONTEND_URL,CORS_ORIGIN,VITE_API_BASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
