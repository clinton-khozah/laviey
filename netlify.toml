# Netlify deploys the Vite frontend only.
# Host lavey_backend separately (Railway, Render, Fly.io, etc.) and set VITE_API_BASE_URL in Netlify env.

[build]
  base = "lavey_frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Backend env vars (PORT, API_PREFIX, etc.) are not used for this static build but
  # trigger false positives: "/api" in import paths, port numbers in mock data, localhost in docs.
  SECRETS_SCAN_OMIT_KEYS = "PORT,API_PREFIX,FRONTEND_URL,CORS_ORIGIN,VITE_API_BASE_URL"

# SPA client-side routes (/join, /auth/callback, /admin/…)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
