name: Deploy to Netlify

on:
  push:
    branches:
      - main
      - testing
      - development
  pull_request:
    branches:
      - main
      - testing
      - development

concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: lavey_frontend/package-lock.json

      - name: Install dependencies
        working-directory: lavey_frontend
        run: npm ci

      - name: Build
        working-directory: lavey_frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://laveybackend-3.onrender.com/api' }}
          VITE_USE_MOCK_API: 'false'
          VITE_USE_REAL_AUTH: 'true'
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://wgyqotbvjnkafmwmhvbj.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_F9_1U8m0og8iS3tQmBD6YQ_xV-AVFlL' }}

      - name: Verify build output
        run: test -f lavey_frontend/dist/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./lavey_frontend/dist
          netlify-config-path: ./netlify.toml
          production-branch: main
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy ${{ github.ref_name }} @ ${{ github.sha }}'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
