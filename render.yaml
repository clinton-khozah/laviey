# Deploy lavey_backend on Render: https://render.com/docs/blueprint-spec
# After deploy, set VITE_API_BASE_URL on Netlify to: https://YOUR-SERVICE.onrender.com/api

services:
  - type: web
    name: lavey-backend
    runtime: node
    plan: free
    rootDir: lavey_backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/meta/routes
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: /api
      - key: FRONTEND_URL
        value: https://loviey.netlify.app
      - key: CORS_ORIGIN
        value: https://loviey.netlify.app,http://localhost:3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ADMIN_REGISTER_SECRET
        sync: false
